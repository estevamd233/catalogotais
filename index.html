<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>

<title>Taís Alves — Nail Designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght=0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #fefaf9;
  --bg-sub: #fbf1f0;
  --rosa-soft: #f8e7eb;
  --rosa-medium: #e8b8c2;
  --rosa-dark: #b38c95;
  --gold: #c8a27a;
  --texto-main: #2d2222;
  --texto-muted: #6e5d5d;
  --branco: #ffffff;
  --shadow-sm: 0 4px 20px rgba(179,140,149,0.06);
  --shadow-md: 0 12px 35px rgba(179,140,149,0.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  width: 100%;
  max-width: 100%;
  background: var(--bg);
  overflow-x: hidden; /* Evita qualquer quebra ou rolagem para os lados */
}

body{
  font-family: 'Inter', sans-serif;
  color: var(--texto-main);
  line-height: 1.5;
  position: relative;
}

img{
  display: block;
  max-width: 100%;
  height: auto;
}

a{
  text-decoration: none;
  color: inherit;
}

.container{
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 10;
}

/* DEGRADÊS DE FUNDO ESTÁTICOS */
.bg-glow {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.glow-orb {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: var(--rosa-soft);
  filter: blur(70px);
  opacity: 0.6;
}

.orb-tr { top: -60px; right: -100px; } 
.orb-bl { bottom: 200px; left: -100px; } 

/* HERO SECTION */
.hero{
  padding: 50px 0 10px;
  background: transparent;
  text-align: center;
}

.hero-content{
  width: 100%;
}

.hero-img{
  width: 190px;
  height: 190px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto;
  border: 6px solid var(--branco);
  box-shadow: var(--shadow-md);
  position: relative;
}

.hero-img img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 18%;
}

.hero-name-container {
  display: inline-block;
  position: relative;
  margin-top: 20px;
}

.hero-name{
  font-family: 'Cormorant Garamond', serif;
  font-size: 46px;
  line-height: 0.95;
  font-weight: 700;
  color: var(--texto-main);
  letter-spacing: -0.5px;
}

.brush-stroke {
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: auto;
  pointer-events: none;
}

.hero-role{
  margin-top: 18px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--rosa-dark);
}

.hero p{
  margin-top: 14px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--texto-muted);
  padding: 0 10px;
}

/* DIVISÓRIA DA LOGO COM LINHAS INFINITAS (MÉTODO FLEXBOX SEGURO) */
.brand-logo-divider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  width: auto;
  margin-left: -24px;  /* Anula o padding lateral do container colando na tela */
  margin-right: -24px; /* Anula o padding lateral do container colando na tela */
  padding: 40px 0 25px;
  gap: 0;
}

.brand-logo-divider-container::before,
.brand-logo-divider-container::after {
  content: "";
  flex: 1; /* Faz as linhas esticarem até o limite absoluto das bordas */
  height: 4px; 
  background: var(--rosa-medium);
  opacity: 0.65;
}

.brand-logo-inner {
  padding: 0; 
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.brand-logo-inner img {
  width: 140px; /* Logo reduzida para harmonia perfeita com a foto de perfil */
  max-width: 55vw; 
  height: auto;
  display: block;
}

/* SECTIONS E ACORDION */
.section{
  padding: 10px 0;
  position: relative;
}

.accordion-trigger {
  width: 100%;
  border: none;
  padding: 16px 24px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--rosa-medium), #d591a2);
  color: var(--branco);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(213,145,162, 0.25);
  transition: all 0.3s ease;
  outline: none;
}

.accordion-trigger::after {
  content: '+';
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--branco);
}

.accordion-trigger.active {
  background: linear-gradient(135deg, #d591a2, var(--rosa-dark));
  box-shadow: 0 4px 12px rgba(213,145,162, 0.15);
}

.accordion-trigger.active::after {
  content: '−';
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.accordion-wrapper {
  padding: 16px 2px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* QUEM SOU EU */
.about-section {
  padding: 10px 0 30px;
}

.about{
  background: var(--branco);
  padding: 24px 20px;
  border-radius: 24px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column; 
  align-items: center;
  text-align: center;
  gap: 20px;
}

.about-image {
  flex-shrink: 0;
}

.about-image img{
  width: 165px; 
  height: 220px; 
  border-radius: 20px;
  object-fit: cover;
  object-position: center 20%;
  box-shadow: var(--shadow-sm);
}

.about-text{
  width: 100%;
}

.about-text h3{
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--rosa-dark);
  margin-bottom: 10px;
}

.about-text p{
  font-size: 13px;
  line-height: 1.6;
  color: var(--texto-muted);
  text-align: justify;
}

/* CONTAINER PADRÃO DE SERVIÇOS */
.service-block {
  background: var(--branco);
  padding: 16px;
  border-radius: 24px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 16px;
}

.service-block-image {
  flex-shrink: 0;
}

.service-block-image img {
  width: 100px;
  height: 135px;
  border-radius: 16px;
  object-fit: cover;
}

.service-block-text {
  flex: 1;
}

.service-block-text h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--texto-main);
  margin-bottom: 4px;
  line-height: 1.2;
}

.service-block-text h5 {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--rosa-dark);
  margin-bottom: 2px;
}

.service-block-text p {
  font-size: 12px;
  line-height: 1.45;
  color: var(--texto-muted);
}

/* CONTATOS E PAGAMENTO */
.payment-section {
  padding: 20px 0;
}

.payment-box{
  background: var(--branco);
  padding: 28px 20px;
  border-radius: 28px;
  box-shadow: var(--shadow-md);
}

.payment-list{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}

.payment-item{
  padding: 10px 4px;
  border-radius: 12px;
  background: var(--bg-sub);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--texto-muted);
  text-align: center;
}

.socials{
  margin-top: 26px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.socials a{
  padding: 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
}

.btn-instagram{
  background: var(--bg-sub);
  color: #5c4348;
  border: 1px solid rgba(179,140,149,0.12);
}

.btn-whatsapp{
  background: linear-gradient(135deg, #dba0ad, var(--rosa-dark));
  color: var(--branco);
  box-shadow: 0 6px 18px rgba(179,140,149,0.25);
}

.address{
  margin-top: 24px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--texto-muted);
  text-align: center;
}

/* FOOTER */
<footer>
  <span>© <span id="year"></span> • Taís Alves Studio</span>
  <span class="credits">Página criada por Flow Páginas</span>
</footer>

</div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  document.querySelectorAll('.accordion-trigger').forEach(trigger => {
    trigger.addEventListener('click', function() {
      this.classList.toggle('active');
      const content = this.nextElementSibling;
      
      if (this.classList.contains('active')) {
        content.style.maxHeight = content.scrollHeight + "px";
        this.setAttribute('aria-expanded', 'true');
      } else {
        content.style.maxHeight = "0px";
        this.setAttribute('aria-expanded', 'false');
      }
    });
  });
</script>

</body>
</html>
