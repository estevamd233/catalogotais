<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Taís Alves — Nail Designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght=0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #fefaf9;
  --bg-sub: #fbf1f0;
  --rosa-soft: #f8e7eb;
  --rosa-medium: #e8b8c2;
  --rosa-dark: #b38c95;
  --gold: #c8a27a;
  --texto-main: #2d2222;
  --texto-muted: #6e5d5d;
  --branco: #ffffff;
  --shadow-sm: 0 4px 20px rgba(179,140,149,0.06);
  --shadow-md: 0 12px 35px rgba(179,140,149,0.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
  -webkit-text-size-adjust: 100%;
}

body{
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--texto-main);
  overflow-x: hidden;
  line-height: 1.5;
  position: relative;
}

img{
  display: block;
  max-width: 100%;
  height: auto;
}

a{
  text-decoration: none;
  color: inherit;
}

.container{
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 10;
}

/* DEGRADÊS DE FUNDO ESTÁTICOS */
.bg-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.glow-orb {
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: var(--rosa-soft);
  filter: blur(80px);
  opacity: 0.6;
}

.orb-tr { top: -120px; right: -120px; } 
.orb-bl { bottom: -120px; left: -120px; } 

/* HERO SECTION */
.hero{
  min-height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 60px 0 0px;
  background: transparent;
}

.hero-content{
  position: relative;
  z-index: 2;
  text-align: center;
  width: 100%;
}

.hero-img{
  width: 200px;
  height: 200px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto;
  border: 8px solid var(--branco);
  box-shadow: var(--shadow-md);
  position: relative;
}

.hero-img img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 18%;
}

.hero-name-container {
  display: inline-block;
  position: relative;
  margin-top: 24px;
}

.hero-name{
  font-family: 'Cormorant Garamond', serif;
  font-size: 50px;
  line-height: 0.95;
  font-weight: 700;
  color: var(--texto-main);
  letter-spacing: -0.5px;
}

.brush-stroke {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: auto;
  pointer-events: none;
}

.brush-line {
  stroke-dasharray: 500;
  stroke-dashoffset: 500;
  animation: drawStroke 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  animation-delay: 0.3s;
}

@keyframes drawStroke {
  to { stroke-dashoffset: 0; }
}

.hero-role{
  margin-top: 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--rosa-dark);
}

.hero p{
  margin-top: 16px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--texto-muted);
  padding: 0 15px;
}

/* DIVISÓRIA DA LOGO COM CONEXÃO PERFEITA */
.brand-logo-divider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100vw;
  position: relative;
  left: 50%;
  right: 50%;
  margin-left: -50vw;
  margin-right: -50vw;
  padding: 40px 0 20px;
}

.brand-logo-divider-container::before,
.brand-logo-divider-container::after {
  content: "";
  flex: 1;
  height: 4px; 
  background: var(--rosa-medium);
  opacity: 0.65;
}

.brand-logo-inner {
  padding: 0; 
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.brand-logo-inner img {
  width: 240px; 
  max-width: 60vw; /* Impede que a logo quebre em celulares muito estreitos */
  height: auto;
  display: block;
}

/* SECTIONS E ACORDION */
.section{
  padding: 12px 0;
  position: relative;
}

.accordion-trigger {
  width: 100%;
  border: none;
  padding: 18px 28px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--rosa-medium), #d591a2);
  color: var(--branco);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(213,145,162, 0.3);
  transition: all 0.3s ease;
}

.accordion-trigger::after {
  content: '+';
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--branco);
  transition: transform 0.3s ease;
}

.accordion-trigger.active {
  background: linear-gradient(135deg, #d591a2, var(--rosa-dark));
  box-shadow: 0 4px 15px rgba(213,145,162, 0.2);
}

.accordion-trigger.active::after {
  content: '−';
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  background: transparent;
}

.accordion-wrapper {
  padding: 20px 4px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* QUEM SOU EU - OTIMIZADO PARA DISPOSITIVOS MÓVEIS (RESPONSIVO) */
.about-section {
  padding: 15px 0 40px;
}

.about{
  background: var(--branco);
  padding: 30px 24px;
  border-radius: 28px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column; /* Empilha foto e texto no celular para não distorcer */
  align-items: center;
  text-align: center;
  gap: 24px;
}

.about-image {
  flex-shrink: 0;
}

.about-image img{
  width: 170px; /* Redimensionamento ideal pedido */
  height: 225px; 
  border-radius: 24px;
  object-fit: cover;
  object-position: center 20%;
  box-shadow: var(--shadow-sm);
}

.about-text{
  flex: 1;
}

.about-text h3{
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--rosa-dark);
  margin-bottom: 12px;
}

.about-text p{
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--texto-muted);
  text-align: justify; /* Melhora distribuição do texto longo em blocos inteiros */
}

/* Ajuste automático caso abra em tablet ou telas um pouco maiores */
@media (min-width: 450px) {
  .about {
    flex-direction: row;
    text-align: left;
    align-items: flex-start;
  }
  .about-text p {
    text-align: left;
  }
}

/* CONTAINER PADRÃO DE SERVIÇOS */
.service-block {
  background: var(--branco);
  padding: 20px;
  border-radius: 28px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 20px;
}

.service-block-image {
  flex-shrink: 0;
}

.service-block-image img {
  width: 120px;
  height: 160px;
  border-radius: 20px;
  object-fit: cover;
}

.service-block-text {
  flex: 1;
}

.service-block-text h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--texto-main);
  margin-bottom: 6px;
  line-height: 1.2;
}

.service-block-text h5 {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--rosa-dark);
  margin-bottom: 2px;
}

.service-block-text p {
  font-size: 12px;
  line-height: 1.5;
  color: var(--texto-muted);
}

/* CONTATOS E PAGAMENTO */
.payment-section {
  padding: 30px 0;
}

.payment-box{
  background: var(--branco);
  padding: 32px 24px;
  border-radius: 32px;
  box-shadow: var(--shadow-md);
}

.payment-list{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.payment-item{
  padding: 12px 5px;
  border-radius: 14px;
  background: var(--bg-sub);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--texto-muted);
  text-align: center;
}

.socials{
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.socials a{
  padding: 18px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  transition: all 0.2s ease;
}

.btn-instagram{
  background: var(--bg-sub);
  color: #5c4348;
  border: 1px solid rgba(179,140,149,0.15);
}

.btn-whatsapp{
  background: linear-gradient(135deg, #dba0ad, var(--rosa-dark));
  color: var(--branco);
  box-shadow: 0 8px 20px rgba(179,140,149,0.3);
}

.address{
  margin-top: 28px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--texto-muted);
  text-align: center;
}

/* FOOTER */
<footer>
  <span>© <span id="year"></span> • Taís Alves Studio</span>
  <span class="credits">Página criada por Flow Páginas</span>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  document.querySelectorAll('.accordion-trigger').forEach(trigger => {
    trigger.addEventListener('click', function() {
      this.classList.toggle('active');
      const content = this.nextElementSibling;
      
      if (this.classList.contains('active')) {
        content.style.maxHeight = content.scrollHeight + "px";
        this.setAttribute('aria-expanded', 'true');
      } else {
        content.style.maxHeight = "0px";
        this.setAttribute('aria-expanded', 'false');
      }
    });
  });
</script>

</body>
</html>
